- date: 2026-03-09
  session: "диагностика: модель делает элементарные логические ошибки"
  category: infrastructure
  type: quality-degradation
  module: настройки + неизвестное
  where: "Множественные сессии: weekly-progress (2 чата подряд), возможно и ранее"
  symptoms: |
    Модель систематически предлагает абсурдные решения при наличии правильного ответа в брифе:
    - Бинарный поиск с ID=1000 вниз в канале со ~100 постами
    - Скачивание всех 200 постов чтобы найти 5 нужных
    - Дублирование 220 строк существующего скрипта вместо переиспользования
    - Игнорирование явно написанной логики ("итерация вперёд от сохранённого ID")
    Контекст: в то же время OpenAI Codex у другого разработчика за 1.5 суток написал 30K строк рабочего production-кода (кейс из YouTube, канал "Эти лит")
  root_cause: "Не установлена. Найдено: effortLevel стоял на минимуме (low) — переключён на max. Включён alwaysThinkingEnabled. Но это гипотеза, не доказанная причина. Проблема может быть шире: архитектура контекста, объём загружаемых файлов, или фундаментальное ограничение модели на задачах проектирования логики (vs генерация кода)."
  fix: "effortLevel: max, alwaysThinkingEnabled: true. Полный аудит всех настроек Claude Code проведён."
  preventive: "Наблюдать за качеством после изменения настроек. Если проблема повторится на max effort — причина не в настройках."
  pattern: "Quality Degradation — модель систематически не справляется с элементарной логикой, причина не установлена"
  resolved: false

- date: 2026-03-10
  session: "svaib-lab: enforce_rule10 hook для правила 10 CLAUDE.md"
  category: infrastructure
  type: platform-limitation
  module: hooks
  where: "PreToolUse hook → чтение transcript_path. Stop hook → permission prompt pipeline"
  root_cause: |
    Правило 10 (текст отдельно от tool calls) невозможно полностью enforce'ить хуками:
    1. PreToolUse: транскрипт НЕ содержит текущий user/assistant message (только предыдущие ходы). Проверено экспериментально — hook видит старые данные и блокирует ложно.
    2. Stop hook: не срабатывает пока висит permission prompt. Если tool call требует Yes/No — hook дождётся только после ответа пользователя. А prompt уже перекрыл экран.
    Итого: hook ловит нарушения только когда ВСЕ tool calls auto-allowed.
  fix: "enforce_rule10.py подключён как Stop hook. Частично работает — ловит auto-allowed случаи (Bash, и т.д.)"
  preventive: "Ограничение платформы Claude Code. Полное решение невозможно без изменения архитектуры (раздельная генерация текста и tool calls). Зафиксировано в lab/todo-hook.md"
  pattern: "Platform Limitation — архитектура Claude Code не позволяет разделить текст и tool calls до permission prompt"
  resolved: true

- date: 2026-03-12
  session: "svaib-lab: эксперимент по механике контекста VSCode"
  category: infrastructure
  type: context-injection-overhead
  module: платформа
  where: "Claude Code VSCode extension — system-reminder injection"
  symptoms: |
    Каждый вопрос-ответ съедает 5-6% контекста даже когда Claude ничего не читает.
  root_cause: |
    Два скрытых пожирателя (подтверждено экспериментально, 25+ замеров):
    1. File modification reminders: после Read/Edit файла VSCode инжектирует diff этого файла
       в КАЖДЫЙ последующий ход. Размер пропорционален diff, не всему файлу.
       Отслеживаются только файлы, которые Claude явно читал/редактировал.
    2. Каскадная загрузка через подпапочные CLAUDE.md: 6 файлов с @README.md
       вызывают полную инъекцию README (~1.5k токенов) на КАЖДЫЙ Read в папке.
       Не кешируется, не дедуплицируется.
    НЕ подтвердилось: CLAUDE.md и MEMORY.md НЕ множатся per turn (статичная стоимость ~15%).
    Открытые табы IDE НЕ инжектируют контент (~20 токенов уведомление).
  fix: "Подробности и рекомендации: knowledge/coding/claude-code.md → секция «Контекст-инъекции в VSCode extension»"
  preventive: "TODO: удалить 6 подпапочных CLAUDE.md с @README.md (добавлено в lab/_inbox/_TODO.md)"
  pattern: "Context Injection Overhead — скрытая стоимость platform-level injection"
  resolved: true

